<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><title>GPS PRO</title></head>
<body>
<h2>GPS con Licencia</h2>

<script>
async function validarLicencia(){
  try{
    const res = await fetch("https://raw.githubusercontent.com/exeandino-gym/Licencias-pro/main/licencias.json?t=" + Date.now());
    const data = await res.json();

    const codigo = localStorage.getItem("codigoLicencia");
    if(!codigo){
      document.body.innerHTML = "🔐 Ingresar código de licencia";
      return;
    }

    const lic = data.find(l => l.codigo === codigo && l.app === "GPS");
    if(!lic || lic.estado !== "activo"){
      document.body.innerHTML = "⛔ Licencia bloqueada";
      return;
    }

    if(lic.vence !== "vitalicio"){
      const hoy = new Date();
      const vence = new Date(lic.vence);
      if(hoy > vence){
        document.body.innerHTML = "⛔ Licencia vencida";
        return;
      }
    }

  }catch(e){
    console.log("error licencia", e);
  }
}

// verificar al iniciar
validarLicencia();

// 🔥 AUTO VERIFICACIÓN CADA 30 SEGUNDOS
setInterval(() => {
  validarLicencia();
}, 30000);
</script>

</body>
</html>
